<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة اشتراكات الزبائن</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .table th { background-color: #0d6efd; color: white; }
        .btn-whatsapp { background-color: #25D366; color: white; }
        .btn-copy { background-color: #6c757d; color: white; }
        .btn-support { background-color: #ff9800; color: white; font-weight: bold; }
        .search-box { border: 2px solid #0d6efd; border-radius: 10px; margin-bottom: 15px; }
        .btn-whatsapp:hover, .btn-copy:hover, .btn-support:hover { opacity: 0.8; color: white; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4>لوحة إدارة الاشتراكات</h4>
        <a href="https://wa.me/9647866134931" target="_blank" class="btn btn-support">📞 الدعم الفني</a>
    </div>

    <div class="card p-3 mb-4">
        <form id="customerForm" class="row g-2">
            <div class="col-md-3"><input type="text" id="custName" class="form-control" placeholder="اسم الزبون" required></div>
            <div class="col-md-2"><input type="text" id="custUser" class="form-control" placeholder="👤 اليوزر" required></div>
            <div class="col-md-2"><input type="text" id="custPass" class="form-control" placeholder="🔑 الباسوورد" required></div>
            <div class="col-md-2"><input type="tel" id="custPhone" class="form-control" placeholder="رقم هاتف الزبون"></div>
            <div class="col-md-3"><input type="text" id="expiryDate" class="form-control" placeholder="📅 تاريخ الانتهاء" required></div>
            <div class="col-12 mt-3 text-center">
                <button type="submit" class="btn btn-primary w-100">حفظ الاشتراك</button>
            </div>
        </form>
    </div>

    <div class="row mb-2">
        <div class="col-md-12">
            <input type="text" id="searchInput" class="form-control search-box" placeholder="🔍 ابحث هنا عن اسم الزبون أو رقم اليوزر...">
        </div>
    </div>

    <div class="card p-3">
        <div class="table-responsive">
            <table class="table table-hover text-center align-middle">
                <thead>
                    <tr>
                        <th>الاسم</th>
                        <th>البيانات</th>
                        <th>الانتهاء</th>
                        <th>إجراءات</th>
                    </tr>
                </thead>
                <tbody id="customerTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById('customerForm');
    const tableBody = document.getElementById('customerTableBody');
    const searchInput = document.getElementById('searchInput');
    const supportNumber = "009647866134931";

    document.addEventListener('DOMContentLoaded', displayCustomers);

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const customer = {
            id: Date.now(),
            name: document.getElementById('custName').value,
            user: document.getElementById('custUser').value,
            pass: document.getElementById('custPass').value,
            phone: document.getElementById('custPhone').value,
            expiry: document.getElementById('expiryDate').value
        };
        let customers = JSON.parse(localStorage.getItem('myCustomers')) || [];
        customers.push(customer);
        localStorage.setItem('myCustomers', JSON.stringify(customers));
        form.reset();
        displayCustomers();
    });

    // ميزة البحث
    searchInput.addEventListener('keyup', displayCustomers);

    function displayCustomers() {
        let customers = JSON.parse(localStorage.getItem('myCustomers')) || [];
        const searchTerm = searchInput.value.toLowerCase();
        
        tableBody.innerHTML = '';
        
        // فلترة الزبائن بناءً على الاسم أو اليوزر
        const filteredCustomers = customers.filter(c => 
            c.name.toLowerCase().includes(searchTerm) || 
            c.user.toLowerCase().includes(searchTerm)
        );

        filteredCustomers.forEach(c => {
            tableBody.innerHTML += `
                <tr>
                    <td><strong>${c.name}</strong></td>
                    <td><small>👤: ${c.user}<br>🔑: ${c.pass}</small></td>
                    <td><span class="badge bg-warning text-dark">${c.expiry}</span></td>
                    <td>
                        <div class="btn-group">
                            <button onclick="copyData('${c.name}', '${c.user}', '${c.pass}', '${c.expiry}')" class="btn btn-sm btn-copy">نسخ</button>
                            <button onclick="sendWhatsApp('${c.name}', '${c.user}', '${c.pass}', '${c.phone}', '${c.expiry}')" class="btn btn-sm btn-whatsapp">واتساب</button>
                            <button onclick="deleteCustomer(${c.id})" class="btn btn-sm btn-danger">حذف</button>
                        </div>
                    </td>
                </tr>`;
        });
    }

    function copyData(name, user, pass, expiry) {
        const text = `مرحباً ${name}\n\nتم تفعيل اشتراكك بنجاح:\n👤 اليوزر: ${user}\n🔑 الباسوورد: ${pass}\n📅 تاريخ الانتهاء: ${expiry}\n\n📞 خدمة الزبائن: ${supportNumber}\n\nنتمنى لك مشاهدة ممتعة!`;
        navigator.clipboard.writeText(text).then(() => {
            alert('تم نسخ الرسالة بنجاح!');
        });
    }

    function sendWhatsApp(name, user, pass, phone, expiry) {
        if(!phone) { alert('يرجى إضافة رقم هاتف للزبون أولاً'); return; }
        const message = `مرحباً ${name}%0A%0Aتم تفعيل اشتراكك بنجاح:%0A👤 اليوزر: ${user}%0A🔑 الباسوورد: ${pass}%0A📅 تاريخ الانتهاء: ${expiry}%0A%0A📞 خدمة الزبائن: ${supportNumber}%0A%0Aنتمنى لك مشاهدة ممتعة!`;
        window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
    }

    function deleteCustomer(id) {
        if(confirm('هل تريد حذف هذا الزبون؟')) {
            let customers = JSON.parse(localStorage.getItem('myCustomers')).filter(c => c.id !== id);
            localStorage.setItem('myCustomers', JSON.stringify(customers));
            displayCustomers();
        }
    }
</script>
</body>
</html>
